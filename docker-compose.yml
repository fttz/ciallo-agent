services:
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api/uploads:/app/uploads

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ciallo
      POSTGRES_USER: ciallo
      POSTGRES_PASSWORD: ciallo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
